<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugPulse Timeline Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --error: #f85149; --success: #3fb950; --warn: #d29922; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .input-area { margin-bottom: 24px; }
    textarea { width: 100%; height: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; resize: vertical; }
    textarea:focus { outline: none; border-color: var(--accent); }
    .btn { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-left: 8px; }
    .hidden { display: none; }
    .timeline { border-left: 2px solid var(--border); margin-left: 12px; padding-left: 20px; }
    .event { position: relative; margin-bottom: 16px; padding: 12px 16px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
    .event::before { content: ''; position: absolute; left: -27px; top: 16px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); }
    .event.nav::before { border-color: var(--accent); background: var(--accent); }
    .event.state::before { border-color: var(--success); background: var(--success); }
    .event.error::before { border-color: var(--error); background: var(--error); }
    .event-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
    .event.nav .event-type { color: var(--accent); }
    .event.state .event-type { color: var(--success); }
    .event.error .event-type { color: var(--error); }
    .event-time { font-size: 11px; color: var(--muted); float: right; }
    .event-content { font-size: 13px; }
    .event-content code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; word-break: break-all; }
    .state-preview { margin-top: 6px; background: var(--bg); padding: 8px 12px; border-radius: 6px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12px; color: var(--muted); max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .device-info { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .device-info h2 { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
    .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .device-item { font-size: 13px; }
    .device-label { color: var(--muted); }
    .section-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px; }
    .error-box { background: var(--error); color: #fff; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BugPulse Timeline Viewer</h1>
    <p class="subtitle">Paste a bug report's diagnostics JSON to visualize the timeline.</p>

    <div id="input-section" class="input-area">
      <textarea id="json-input" placeholder='Paste the full bug report JSON or just the "diagnostics" object here...'></textarea>
      <button class="btn" id="btn-view">View Timeline</button>
      <button class="btn btn-secondary" id="btn-sample">Load Sample</button>
    </div>

    <div id="error-msg" class="error-box hidden"></div>

    <div id="report-section" class="hidden">
      <div id="device-info"></div>
      <h3 class="section-title">Timeline</h3>
      <div id="timeline" class="timeline"></div>
    </div>
  </div>

  <script>
    // Safe DOM helpers — no innerHTML, all content set via textContent
    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'class') node.className = v;
          else if (k === 'style') Object.assign(node.style, v);
          else node.setAttribute(k, v);
        }
      }
      if (children) {
        for (const child of Array.isArray(children) ? children : [children]) {
          if (typeof child === 'string') node.appendChild(document.createTextNode(child));
          else if (child) node.appendChild(child);
        }
      }
      return node;
    }

    function formatTime(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return ts; }
    }

    function deviceItem(label, value) {
      return el('div', { class: 'device-item' }, [
        el('span', { class: 'device-label' }, label + ': '),
        document.createTextNode(value || 'unknown')
      ]);
    }

    function parseAndRender() {
      const raw = document.getElementById('json-input').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.add('hidden');
      errorEl.textContent = '';

      if (!raw) { showError('Paste some JSON first.'); return; }

      let data;
      try { data = JSON.parse(raw); } catch (e) { showError('Invalid JSON: ' + e.message); return; }

      const diagnostics = data.diagnostics || data;
      if (!diagnostics.navHistory && !diagnostics.stateSnapshots && !diagnostics.lastError) {
        showError('Could not find diagnostics data. Paste a full bug report JSON or a diagnostics object.');
        return;
      }

      renderReport(data, diagnostics);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function renderReport(fullReport, diagnostics) {
      document.getElementById('input-section').classList.add('hidden');
      document.getElementById('report-section').classList.remove('hidden');

      // Device info
      const deviceEl = document.getElementById('device-info');
      deviceEl.textContent = '';
      if (fullReport.device) {
        const d = fullReport.device;
        const grid = el('div', { class: 'device-grid' }, [
          deviceItem('Device', d.model),
          deviceItem('OS', d.os),
          deviceItem('App', d.appVersion),
          deviceItem('Screen', d.screenSize),
          deviceItem('Locale', d.locale),
          fullReport.screen ? deviceItem('Screen Name', fullReport.screen) : null,
          fullReport.description ? deviceItem('Description', fullReport.description) : null,
        ].filter(Boolean));
        deviceEl.appendChild(el('h2', null, 'Device Info'));
        deviceEl.appendChild(grid);
      }

      // Build timeline events
      const events = [];
      if (diagnostics.navHistory) {
        for (const nav of diagnostics.navHistory) {
          events.push({ type: 'nav', time: nav.timestamp, data: nav });
        }
      }
      if (diagnostics.stateSnapshots) {
        for (const snap of diagnostics.stateSnapshots) {
          events.push({ type: 'state', time: snap.timestamp, data: snap });
        }
      }
      if (diagnostics.lastError) {
        events.push({ type: 'error', time: diagnostics.lastError.timestamp, data: diagnostics.lastError });
      }

      events.sort((a, b) => a.time.localeCompare(b.time));

      const timelineEl = document.getElementById('timeline');
      timelineEl.textContent = '';
      for (const ev of events) {
        timelineEl.appendChild(renderEvent(ev));
      }
    }

    function renderEvent(ev) {
      const timeSpan = el('span', { class: 'event-time' }, formatTime(ev.time));

      if (ev.type === 'nav') {
        return el('div', { class: 'event nav' }, [
          timeSpan,
          el('div', { class: 'event-type' }, 'Navigation'),
          el('div', { class: 'event-content' }, [el('code', null, ev.data.pathname)])
        ]);
      }

      if (ev.type === 'state') {
        let stateStr = ev.data.state;
        try { stateStr = JSON.stringify(JSON.parse(ev.data.state), null, 2); } catch {}
        const label = 'State: ' + ev.data.name + (ev.data.truncated ? ' [TRUNCATED]' : '');
        return el('div', { class: 'event state' }, [
          timeSpan,
          el('div', { class: 'event-type' }, label),
          el('div', { class: 'state-preview' }, stateStr)
        ]);
      }

      if (ev.type === 'error') {
        const e = ev.data;
        const children = [
          timeSpan,
          el('div', { class: 'event-type' }, 'Error'),
          el('div', { class: 'event-content' }, [el('code', null, e.message)])
        ];
        if (e.stack) children.push(el('div', { class: 'state-preview' }, e.stack));
        if (e.componentStack) children.push(el('div', { class: 'state-preview' }, e.componentStack));
        return el('div', { class: 'event error' }, children);
      }

      return el('div');
    }

    function loadSample() {
      document.getElementById('json-input').value = JSON.stringify({
        description: "Payment button doesn't work",
        screen: "/checkout",
        timestamp: "2026-03-29T23:15:42.000Z",
        device: { model: "iPhone 15 Pro", os: "ios 18.2", appVersion: "1.2.0", screenSize: "393x852", locale: "en-US" },
        diagnostics: {
          navHistory: [
            { pathname: "/home", segments: ["home"], timestamp: "2026-03-29T23:14:01.000Z" },
            { pathname: "/products/42", segments: ["products", "42"], timestamp: "2026-03-29T23:14:18.000Z" },
            { pathname: "/cart", segments: ["cart"], timestamp: "2026-03-29T23:14:45.000Z" },
            { pathname: "/checkout", segments: ["checkout"], timestamp: "2026-03-29T23:15:02.000Z" }
          ],
          stateSnapshots: [
            { name: "cart", state: '{"items":[{"id":42,"name":"Widget","price":29.99},{"id":7,"name":"Gadget","price":null}],"total":29.99}', timestamp: "2026-03-29T23:14:50.000Z", truncated: false },
            { name: "auth", state: '{"userId":"user_123","loggedIn":true}', timestamp: "2026-03-29T23:14:01.000Z", truncated: false }
          ],
          lastError: {
            message: "TypeError: Cannot read property 'price' of undefined",
            stack: "TypeError: Cannot read property 'price' of undefined\n    at CheckoutScreen.calculateTotal (CheckoutScreen.tsx:87)\n    at CheckoutScreen.render (CheckoutScreen.tsx:142)",
            componentStack: "\n    at CheckoutScreen\n    at AppNavigator\n    at App",
            timestamp: "2026-03-29T23:15:40.000Z"
          }
        }
      }, null, 2);
    }

    // Event listeners
    document.getElementById('btn-view').addEventListener('click', parseAndRender);
    document.getElementById('btn-sample').addEventListener('click', loadSample);

    // Check URL params for inline data
    const params = new URLSearchParams(window.location.search);
    const urlData = params.get('data');
    if (urlData) {
      try {
        document.getElementById('json-input').value = atob(urlData);
        parseAndRender();
      } catch { /* invalid base64 */ }
    }
  </script>
</body>
</html>
